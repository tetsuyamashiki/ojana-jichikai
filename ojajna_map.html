<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大謝名区 区域確認マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #f5f4f0;
    color: #2c2c2a;
  }

  header {
    background: #085041;
    color: #fff;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  header p {
    font-size: 0.8rem;
    opacity: 0.75;
    margin-top: 2px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #d3d1c7;
  }

  #map {
    width: 100%;
    height: 480px;
  }

  .map-footer {
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    border-top: 1px solid #e8e7e3;
    background: #fafaf8;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: #5f5e5a;
  }

  .legend-box {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    background: rgba(29,158,117,0.22);
    border: 2px solid #0F6E56;
    flex-shrink: 0;
  }

  .hint {
    font-size: 12px;
    color: #888780;
    margin-left: auto;
  }

  .note {
    margin-top: 1rem;
    background: #e1f5ee;
    border-left: 3px solid #1D9E75;
    border-radius: 0 8px 8px 0;
    padding: 0.75rem 1rem;
    font-size: 13px;
    color: #085041;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    #map { height: 360px; }
    header h1 { font-size: 1rem; }
    .hint { margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>大謝名区　区域確認マップ</h1>
    <p>宜野湾市大謝名区自治会</p>
  </div>
</header>

<div class="container">
  <div class="card">
    <div id="map"></div>
    <div class="map-footer">
      <div class="legend">
        <div class="legend-box"></div>
        大謝名区の区域
      </div>
      <span class="hint">拡大・縮小・スクロールができます</span>
    </div>
  </div>

  <div class="note">
    ※ 区域の境界はおおよその目安です。境界付近の場合は区の担当者にご確認ください。
  </div>
</div>

<script>
const map = L.map('map').setView([26.2667, 127.7360], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

const geojson = {
  "type": "FeatureCollection",
  "features": [
    {
      "type": "Feature",
      "geometry": {
        "type": "Polygon",
        "coordinates": [
          [
            [127.735199, 26.269289],
            [127.733166, 26.268827],
            [127.7328426, 26.2686724],
            [127.7326491, 26.2684426],
            [127.7323601, 26.2682471],
            [127.7324528, 26.2681248],
            [127.732202, 26.2677459],
            [127.7322483, 26.2674306],
            [127.7324773, 26.2672741],
            [127.7334233, 26.2669245],
            [127.733498, 26.266061],
            [127.733115, 26.265637],
            [127.73304, 26.265361],
            [127.7332128, 26.265292],
            [127.7327698, 26.2646075],
            [127.7325095, 26.2642458],
            [127.7329565, 26.2639907],
            [127.733429, 26.2638176],
            [127.734297, 26.2634177],
            [127.7348288, 26.2636215],
            [127.7351075, 26.2640013],
            [127.7352635, 26.2638879],
            [127.7354987, 26.2642805],
            [127.7358261, 26.2647746],
            [127.735854, 26.2649393],
            [127.7362161, 26.2649115],
            [127.7366832, 26.264847],
            [127.736773, 26.265001],
            [127.7375555, 26.2650368],
            [127.7379903, 26.2656121],
            [127.7381318, 26.2655355],
            [127.7384474, 26.2657396],
            [127.7389026, 26.266128],
            [127.7389614, 26.2664308],
            [127.7392037, 26.2664901],
            [127.7399336, 26.2660952],
            [127.7401725, 26.2662082],
            [127.7405312, 26.266921],
            [127.7405906, 26.267162],
            [127.7408141, 26.2671468],
            [127.7408424, 26.2674347],
            [127.7398666, 26.2681791],
            [127.7397591, 26.268311],
            [127.7395498, 26.2684353],
            [127.7398146, 26.2687134],
            [127.7396138, 26.2688566],
            [127.7395076, 26.2690128],
            [127.7389084, 26.2691963],
            [127.738075, 26.268606],
            [127.73782, 26.26837],
            [127.737496, 26.2685598],
            [127.7369489, 26.2679634],
            [127.7367558, 26.2681221],
            [127.7362828, 26.268229],
            [127.7358604, 26.2683225],
            [127.7355021, 26.2686342],
            [127.735199, 26.269289]
          ]
        ]
      },
      "properties": {}
    }
  ]
};

const layer = L.geoJSON(geojson, {
  style: {
    color: '#0F6E56',
    weight: 2.5,
    fillColor: '#1D9E75',
    fillOpacity: 0.22
  }
}).addTo(map);

layer.bindPopup('<b>大謝名区</b><br>宜野湾市大謝名');

map.fitBounds(layer.getBounds(), { padding: [40, 40] });
</script>

</body>
</html>
